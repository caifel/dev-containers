name: ${PROJECT_NAME:-ajedrezlapaz}

services:
  prod-web:
    build:
      context: ${WEB_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/web}
      dockerfile: /Users/mariomedrano/Projects/ajedrezlapaz/ops/docker/prod-web/Dockerfile
    image: ${PROJECT_NAME:-ajedrezlapaz}-prod-web
    container_name: ${PROJECT_NAME:-ajedrezlapaz}-prod-web
    environment:
      NODE_ENV: production
      API_URL: http://prod-api:8081
    ports:
      - "${PROD_WEB_PORT:-8080}:8080"
    networks:
      - webnet

  prod-api:
    build:
      context: ${API_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/api}
      dockerfile: /Users/mariomedrano/Projects/ajedrezlapaz/ops/docker/prod-api/Dockerfile
    image: ${PROJECT_NAME:-ajedrezlapaz}-prod-api
    container_name: ${PROJECT_NAME:-ajedrezlapaz}-prod-api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8081
      SQLITE_PATH: /app/data/app.db
      FRONTEND_URL: ${PROD_FRONTEND_URL:-http://localhost:8080}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET is required}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required in production}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@support.ajedrezlapaz.com}
    ports:
      - "${PROD_API_PORT:-8081}:8081"
    volumes:
      - prod-api-sqlite-data:/app/data
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  prod-api-sqlite-data:
