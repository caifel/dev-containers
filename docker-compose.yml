name: ${PROJECT_NAME:-ajedrezlapaz}

services:
  ws:
    build:
      context: .
      dockerfile: docker/ws/Dockerfile
    image: ${PROJECT_NAME:-ajedrezlapaz}-ws
    container_name: ${PROJECT_NAME:-ajedrezlapaz}-ws
    hostname: dev
    working_dir: /alp
    command: zsh
    tty: true
    stdin_open: true
    environment:
      NODE_ENV: development
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SHELL: /bin/zsh
      EDITOR: nvim
      VISUAL: nvim
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ${WEB_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/web}:/alp/web
      - ${API_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/api}:/alp/api
      - ${OPS_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/ops}:/alp/ops
      - ${DOTFILES_PATH:-/Users/mariomedrano/Dev/.dotfiles}:/alp/dotfiles:ro
      - ws-home:/home/mario
      - ws-bun-cache:/home/mario/.bun/install/cache
    networks:
      - webnet

  dev-web:
    build:
      context: .
      dockerfile: docker/dev-web/Dockerfile
    image: ${PROJECT_NAME:-ajedrezlapaz}-dev-web
    container_name: ${PROJECT_NAME:-ajedrezlapaz}-dev-web
    hostname: dev
    working_dir: /alp/web
    command: sh -lc "bun install && bun --bun run dev --hostname 0.0.0.0"
    tty: true
    stdin_open: true
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: http://dev-api:4000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${DEV_WEB_PORT:-3000}:3000"
    volumes:
      - ${WEB_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/web}:/alp/web
      - dev-web-node-modules:/alp/web/node_modules
      - dev-web-bun-cache:/home/mario/.bun/install/cache
    networks:
      - webnet

  dev-api:
    build:
      context: .
      dockerfile: docker/dev-api/Dockerfile
    image: ${PROJECT_NAME:-ajedrezlapaz}-dev-api
    container_name: ${PROJECT_NAME:-ajedrezlapaz}-dev-api
    hostname: dev
    working_dir: /alp/api
    command: sh -lc "bun install && bun run db:migrate && bun run dev"
    tty: true
    stdin_open: true
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      SQLITE_PATH: ${SQLITE_PATH:-/alp/api/data/app.db}
      FRONTEND_URL: ${DEV_FRONTEND_URL:-http://localhost:3000}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET is required}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ${API_PATH:-/Users/mariomedrano/Projects/ajedrezlapaz/api}:/alp/api
      - dev-api-node-modules:/alp/api/node_modules
      - dev-api-bun-cache:/home/mario/.bun/install/cache
      - dev-api-sqlite-data:/alp/api/data
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  ws-home:
  ws-bun-cache:
  dev-web-node-modules:
  dev-web-bun-cache:
  dev-api-node-modules:
  dev-api-bun-cache:
  dev-api-sqlite-data:
